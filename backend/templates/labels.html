{% extends "base.html" %}
{% block title %}Labels — Label Logic{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <div class="page-title mb-0"><i class="bi bi-tags-fill"></i> Labels &amp; Unread Counts</div>
  <button class="btn btn-outline-secondary" id="refresh-labels-btn"><i class="bi bi-arrow-clockwise me-1"></i>Refresh</button>
</div>
<div class="row g-3 mb-4">
  <div class="col-auto"><div class="stat-chip"><div class="stat-val" id="total-labels-count">—</div><div class="stat-label">Labels</div></div></div>
  <div class="col-auto"><div class="stat-chip"><div class="stat-val" id="total-unread-count" style="color:#e57373">—</div><div class="stat-label">Total Unread</div></div></div>
</div>
<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span><i class="bi bi-inbox me-2" style="color:var(--marb)"></i>Your Labels</span>
    <div class="d-flex gap-2">
      <input type="text" id="label-search" class="form-control form-control-sm" placeholder="Filter labels..." style="width:200px" />
      <button class="btn btn-sm btn-outline-secondary" id="init-default-labels-btn"><i class="bi bi-plus-circle me-1"></i>Init Default Labels</button>
    </div>
  </div>
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table mb-0">
        <thead><tr><th>Label Name</th><th class="text-end">Unread</th><th class="text-end">Total</th><th class="text-end">Actions</th></tr></thead>
        <tbody id="labels-table-body">
          <tr><td colspan="4" class="text-center py-4" style="color:var(--txm)"><div class="spinner-border spinner-sm text-secondary me-2"></div>Loading labels...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<div id="labels-status" class="mt-2"></div>
<div id="init-labels-status" class="mt-2"></div>
{% endblock %}
{% block scripts %}<script src="{{ url_for('static', filename='labels.js') }}"></script>{% endblock %}
